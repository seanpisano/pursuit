<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Morning Task Timer</title>
  <style>
    :root{
      --light-green:#9EE493;
      --frosted-mint:#DAF7DC;
      --ash-grey:#ABC8C0;
      --dusty-lavender:#70566D;
      --midnight-violet:#42273B;

      --bg: var(--frosted-mint);
      --text:#1f1a1e;
      --muted:rgba(31,26,30,.72);
      --stroke:rgba(66,39,59,.18);
      --card:rgba(255,255,255,.52);
      --shadow:0 14px 34px rgba(66,39,59,.10);
      --radius:16px;

      --btn-green: rgba(158,228,147,.85);
      --btn-green-2: rgba(158,228,147,.62);
      --btn-purple: rgba(112,86,109,.92);
      --btn-purple-2: rgba(66,39,59,.92);
      --focus: 0 0 0 3px rgba(158,228,147,.45);
      --focus2: 0 0 0 3px rgba(112,86,109,.25);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(158,228,147,.35), transparent 55%),
        radial-gradient(900px 520px at 80% 15%, rgba(171,200,192,.34), transparent 55%),
        radial-gradient(900px 620px at 50% 100%, rgba(112,86,109,.13), transparent 60%),
        var(--bg);
      min-height:100vh;
      padding:26px 14px 36px;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .header{
      background: linear-gradient(90deg, rgba(158,228,147,.75), rgba(218,247,220,.75));
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px 20px;
      text-align:center;
      margin-bottom:14px;
    }
    .header h1{
      margin:0;
      font-size:42px;
      letter-spacing:.2px;
    }

    .panel{
      background: var(--card);
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:18px 18px 16px;
    }

    .btnstack{display:grid; gap:12px; margin:10px 0 16px;}
    .btn{
      appearance:none;
      border:1px solid var(--stroke);
      border-radius: 14px;
      padding:14px 16px;
      font-weight:800;
      font-size:22px;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(66,39,59,.10);
      transition: transform .05s ease, filter .15s ease, box-shadow .15s ease;
      background: rgba(255,255,255,.45);
      color:var(--text);
    }
    .btn:active{transform:translateY(1px)}
    .btn:focus{outline:none; box-shadow: var(--focus);}
    .btn.primary{
      background: linear-gradient(180deg, var(--btn-green), var(--btn-green-2));
    }
    .btn.secondary{
      background: linear-gradient(180deg, rgba(218,247,220,.85), rgba(171,200,192,.35));
    }

    .divider{height:1px; background: rgba(66,39,59,.12); margin:14px 0;}

    .center{text-align:center}
    .project{
      font-size:26px;
      font-weight:700;
      margin-top:8px;
      color:var(--muted);
    }
    .workingOn{
      margin-top:8px;
      font-size:24px;
      color:var(--muted);
    }
    .taskTitle{
      margin-top:4px;
      font-size:38px;
      font-weight:900;
      letter-spacing:.2px;
    }

    /* Ring timer */
    .ringWrap{
      display:grid;
      place-items:center;
      margin:14px 0 10px;
    }
    .ring{
      width:260px;
      height:260px;
      border-radius:50%;
      background:
        conic-gradient(var(--midnight-violet) var(--p,0%), rgba(66,39,59,.18) 0);
      display:grid;
      place-items:center;
      box-shadow: inset 0 0 0 18px rgba(255,255,255,.35);
      border:1px solid rgba(66,39,59,.12);
    }
    .ringInner{
      width:190px;
      height:190px;
      background: rgba(255,255,255,.55);
      border-radius:50%;
      border:1px solid rgba(66,39,59,.14);
      display:grid;
      place-items:center;
    }
    .time{
      font-variant-numeric: tabular-nums;
      font-size:64px;
      font-weight:900;
      letter-spacing:1px;
    }

    .actionRow{
      display:flex;
      gap:12px;
      justify-content:space-between;
      margin:8px 0 8px;
      flex-wrap:wrap;
    }
    .actionRow .btn{
      flex:1 1 260px;
      font-size:22px;
      padding:14px 14px;
    }
    .btn.complete{
      background: linear-gradient(180deg, rgba(218,247,220,.9), rgba(158,228,147,.65));
    }
    .btn.next{
      background: linear-gradient(180deg, var(--btn-purple), var(--btn-purple-2));
      color:#fff;
      border-color: rgba(66,39,59,.35);
    }
    .btn.next:focus{ box-shadow: var(--focus2); }

    .meta{
      text-align:center;
      color:var(--muted);
      font-size:20px;
      line-height:1.5;
      margin-top:6px;
    }
    .meta b{color:var(--text)}

    details{
      margin-top:14px;
      border:1px solid var(--stroke);
      border-radius: var(--radius);
      overflow:hidden;
      background: rgba(255,255,255,.45);
    }
    summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      padding:12px 14px;
      font-weight:900;
      font-size:22px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background: linear-gradient(90deg, rgba(158,228,147,.55), rgba(218,247,220,.30));
    }
    summary::-webkit-details-marker{display:none}
    .chev{
      width:0;height:0;
      border-left:6px solid transparent;
      border-right:6px solid transparent;
      border-top:8px solid rgba(31,26,30,.75);
      transition: transform .15s ease;
    }
    details[open] .chev{transform:rotate(180deg)}

    .list{
      border-top:1px solid rgba(66,39,59,.12);
      padding:10px 10px 12px;
    }

    .row{
      display:grid;
      grid-template-columns: 28px 1fr 34px;
      gap:10px;
      align-items:center;
      padding:10px 8px;
      border-radius: 12px;
    }
    .row + .row{ border-top:1px solid rgba(66,39,59,.10); border-radius:0; }
    .row:hover{ background: rgba(218,247,220,.35); }

    .cb{
      width:20px;height:20px;
      border-radius:6px;
      border:2px solid rgba(66,39,59,.35);
      background: rgba(255,255,255,.55);
    }

    .dots{
      text-align:right;
      font-weight:900;
      color: rgba(66,39,59,.55);
      letter-spacing:2px;
    }

    .footerNote{
      margin-top:10px;
      text-align:center;
      padding:10px 12px;
      background: rgba(171,200,192,.25);
      border:1px solid rgba(66,39,59,.10);
      border-radius: 12px;
      color: rgba(31,26,30,.78);
      font-weight:700;
    }

    /* Modal */
    .modalBackdrop{
      position:fixed; inset:0;
      background: rgba(66,39,59,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .modal{
      width:min(560px, 100%);
      background: rgba(255,255,255,.85);
      border:1px solid rgba(66,39,59,.20);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      overflow:hidden;
    }
    .modalHeader{
      padding:14px 16px;
      background: linear-gradient(90deg, rgba(112,86,109,.40), rgba(218,247,220,.30));
      font-weight:900;
      font-size:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .x{
      border:none;
      background: transparent;
      font-size:22px;
      cursor:pointer;
      color: rgba(66,39,59,.75);
    }
    .modalBody{ padding:14px 16px 16px; }
    .modalBody label{
      display:block;
      font-weight:800;
      margin:10px 0 8px;
    }
    .modalBody input, .modalBody select{
      width:100%;
      border:1px solid rgba(66,39,59,.20);
      border-radius: 12px;
      padding:12px 12px;
      font-size:16px;
      background: rgba(255,255,255,.8);
      outline:none;
    }
    .modalBody input:focus, .modalBody select:focus{ box-shadow: var(--focus); }
    .modalActions{
      display:flex;
      gap:10px;
      margin-top:14px;
    }
    .smallBtn{
      flex:1 1 auto;
      padding:12px 14px;
      border-radius: 12px;
      border:1px solid rgba(66,39,59,.20);
      font-weight:900;
      cursor:pointer;
      background: rgba(255,255,255,.55);
    }
    .smallBtn.save{
      background: linear-gradient(180deg, var(--btn-green), var(--btn-green-2));
    }

    @media (max-width:520px){
      .header h1{font-size:34px}
      .taskTitle{font-size:32px}
      .ring{width:230px;height:230px}
      .ringInner{width:170px;height:170px}
      .time{font-size:56px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>Good Morning!</h1>
    </div>

    <div class="panel">
      <div class="btnstack">
        <button id="btnAssign" class="btn primary" type="button">Assign Me a Task</button>
        <button id="btnChoose" class="btn secondary" type="button">Choose a Task</button>
      </div>

      <div class="divider"></div>

      <div class="center">
        <div id="projectName" class="project">Marketing Strategy</div>
        <div class="workingOn">Working on:</div>
        <div id="currentTaskName" class="taskTitle">Write Report</div>
      </div>

      <div class="ringWrap">
        <div id="ring" class="ring" style="--p:0%;">
          <div class="ringInner">
            <div id="timerText" class="time">25:00</div>
          </div>
        </div>
      </div>

      <div class="actionRow">
        <button id="btnCompleted" class="btn complete" type="button">Completed</button>
        <button id="btnNext" class="btn next" type="button">Move to Next Task</button>
      </div>

      <div class="divider"></div>

      <div class="meta">
        Time Spent: <b id="timeSpent">00:00</b><br/>
        Status: <b id="statusText">Incomplete</b>
      </div>

      <details open>
        <summary>
          <span>Today's Tasks (<span id="incompleteCount">0</span> Incomplete)</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div id="taskList" class="list"></div>
        <div class="footerNote">Incomplete Tasks Saved for Later</div>
      </details>
    </div>
  </div>

  <!-- Choose Task Modal -->
  <div id="modalBackdrop" class="modalBackdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <div class="modalHeader">
        <div>Choose a Task</div>
        <button id="btnCloseModal" class="x" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modalBody">
        <label for="projectSelect">Project</label>
        <select id="projectSelect"></select>

        <label for="taskSelect">Task</label>
        <select id="taskSelect"></select>

        <label for="durationSelect">Timer Duration</label>
        <select id="durationSelect">
          <option value="900">15 minutes</option>
          <option value="1500" selected>25 minutes</option>
          <option value="1800">30 minutes</option>
          <option value="2700">45 minutes</option>
          <option value="3600">60 minutes</option>
        </select>

        <div class="modalActions">
          <button id="btnModalCancel" class="smallBtn" type="button">Cancel</button>
          <button id="btnModalStart" class="smallBtn save" type="button">Start</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // -----------------------------
    // Demo data (replace with your backend later)
    // -----------------------------
    const projects = [
      {
        name: "Marketing Strategy",
        tasks: [
          { name: "Write Report", spentSec: 0, complete: false },
          { name: "Review Presentation", spentSec: 0, complete: false },
          { name: "Read Emails", spentSec: 0, complete: false }
        ]
      },
      {
        name: "NYCThirst",
        tasks: [
          { name: "Add 5 bars", spentSec: 0, complete: false },
          { name: "Upload 3 photos", spentSec: 0, complete: false }
        ]
      }
    ];

    // -----------------------------
    // State
    // -----------------------------
    let currentProjectIndex = 0;
    let currentTaskIndex = 0;

    let durationSec = 25 * 60;      // default 25:00
    let remainingSec = durationSec;
    let elapsedSec = 0;

    let tick = null;
    let isRunning = false;
    let sessionStatus = "Incomplete"; // Incomplete | Completed | Moved

    // -----------------------------
    // Elements
    // -----------------------------
    const elProjectName = document.getElementById("projectName");
    const elCurrentTask = document.getElementById("currentTaskName");
    const elTimerText = document.getElementById("timerText");
    const elRing = document.getElementById("ring");
    const elTimeSpent = document.getElementById("timeSpent");
    const elStatusText = document.getElementById("statusText");
    const elTaskList = document.getElementById("taskList");
    const elIncompleteCount = document.getElementById("incompleteCount");

    const btnAssign = document.getElementById("btnAssign");
    const btnChoose = document.getElementById("btnChoose");
    const btnCompleted = document.getElementById("btnCompleted");
    const btnNext = document.getElementById("btnNext");

    // Modal
    const modalBackdrop = document.getElementById("modalBackdrop");
    const btnCloseModal = document.getElementById("btnCloseModal");
    const btnModalCancel = document.getElementById("btnModalCancel");
    const btnModalStart = document.getElementById("btnModalStart");
    const projectSelect = document.getElementById("projectSelect");
    const taskSelect = document.getElementById("taskSelect");
    const durationSelect = document.getElementById("durationSelect");

    // -----------------------------
    // Helpers
    // -----------------------------
    function pad2(n){ return String(n).padStart(2,"0"); }

    function fmtMMSS(totalSec){
      const m = Math.floor(totalSec/60);
      const s = totalSec % 60;
      return `${pad2(m)}:${pad2(s)}`;
    }

    function setRingProgress(){
      const p = durationSec <= 0 ? 0 : (elapsedSec / durationSec) * 100;
      elRing.style.setProperty("--p", `${Math.min(100, Math.max(0,p))}%`);
    }

    function stopTimer(){
      if(tick) clearInterval(tick);
      tick = null;
      isRunning = false;
    }

    function startTimer(){
      stopTimer();
      isRunning = true;
      tick = setInterval(()=>{
        if(remainingSec <= 0){
          remainingSec = 0;
          renderTimer();
          stopTimer();
          return;
        }
        remainingSec -= 1;
        elapsedSec += 1;

        // track time on current task (demo)
        const t = projects[currentProjectIndex].tasks[currentTaskIndex];
        t.spentSec += 1;

        renderTimer();
        renderMeta();
        renderTasks();
      }, 1000);
    }

    function resetSession(newDurationSec){
      durationSec = newDurationSec;
      remainingSec = newDurationSec;
      elapsedSec = 0;
      sessionStatus = "Incomplete";
      elStatusText.textContent = sessionStatus;
      renderTimer();
      renderMeta();
      setRingProgress();
    }

    function renderTimer(){
      elTimerText.textContent = fmtMMSS(remainingSec);
      setRingProgress();
    }

    function renderMeta(){
      elTimeSpent.textContent = fmtMMSS(elapsedSec);
      elStatusText.textContent = sessionStatus;
    }

    function renderHeader(){
      elProjectName.textContent = projects[currentProjectIndex].name;
      elCurrentTask.textContent = projects[currentProjectIndex].tasks[currentTaskIndex].name;
    }

    function countIncomplete(){
      let c = 0;
      for(const p of projects){
        for(const t of p.tasks) if(!t.complete) c++;
      }
      return c;
    }

    function renderTasks(){
      const p = projects[currentProjectIndex];
      const tasks = p.tasks;

      // For the mockup feel, show current project's tasks list
      elTaskList.innerHTML = "";
      tasks.forEach((t, idx)=>{
        const row = document.createElement("div");
        row.className = "row";

        const cb = document.createElement("div");
        cb.className = "cb";
        if(t.complete){
          cb.style.background = "rgba(158,228,147,.55)";
          cb.style.borderColor = "rgba(158,228,147,.85)";
        }

        const label = document.createElement("div");
        const elapsed = t.spentSec ? ` - ${fmtMMSS(t.spentSec)} elapsed` : "";
        label.textContent = `${t.name}${elapsed}`;

        const dots = document.createElement("div");
        dots.className = "dots";
        dots.textContent = "•••";

        row.appendChild(cb);
        row.appendChild(label);
        row.appendChild(dots);

        // click to switch task quickly
        row.addEventListener("click", ()=>{
          currentTaskIndex = idx;
          renderHeader();
          resetSession(durationSec);
          startTimer();
        });

        elTaskList.appendChild(row);
      });

      elIncompleteCount.textContent = countIncomplete();
    }

    function assignNextIncomplete(){
      // pick first incomplete task in current project; if none, scan other projects
      for(let pi=0; pi<projects.length; pi++){
        const p = projects[pi];
        const ti = p.tasks.findIndex(t=>!t.complete);
        if(ti !== -1){
          currentProjectIndex = pi;
          currentTaskIndex = ti;
          renderHeader();
          return true;
        }
      }
      return false;
    }

    function moveToNextTask(){
      // mark current session as moved (not completed), keep task incomplete
      sessionStatus = "Incomplete";
      renderMeta();

      // find next incomplete in current project
      const p = projects[currentProjectIndex];
      for(let i=currentTaskIndex+1; i<p.tasks.length; i++){
        if(!p.tasks[i].complete){
          currentTaskIndex = i;
          renderHeader();
          resetSession(durationSec);
          startTimer();
          return;
        }
      }
      // otherwise scan all projects
      const ok = assignNextIncomplete();
      if(ok){
        resetSession(durationSec);
        startTimer();
      }
    }

    // -----------------------------
    // Modal controls
    // -----------------------------
    function openModal(){
      modalBackdrop.style.display = "flex";
      modalBackdrop.setAttribute("aria-hidden","false");
      projectSelect.focus();
    }
    function closeModal(){
      modalBackdrop.style.display = "none";
      modalBackdrop.setAttribute("aria-hidden","true");
    }

    function populateModal(){
      projectSelect.innerHTML = "";
      projects.forEach((p, i)=>{
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = p.name;
        projectSelect.appendChild(opt);
      });
      projectSelect.value = String(currentProjectIndex);
      refreshTaskSelect();
      durationSelect.value = String(durationSec);
    }

    function refreshTaskSelect(){
      const pi = parseInt(projectSelect.value,10);
      taskSelect.innerHTML = "";
      projects[pi].tasks.forEach((t, i)=>{
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = t.name + (t.complete ? " (done)" : "");
        taskSelect.appendChild(opt);
      });
      taskSelect.value = String(currentTaskIndex);
    }

    // -----------------------------
    // Events
    // -----------------------------
    btnAssign.addEventListener("click", ()=>{
      const ok = assignNextIncomplete();
      if(!ok){
        alert("No incomplete tasks left.");
        return;
      }
      resetSession(durationSec);
      startTimer();
      renderTasks();
    });

    btnChoose.addEventListener("click", ()=>{
      populateModal();
      openModal();
    });

    btnCompleted.addEventListener("click", ()=>{
      // mark task complete and stop timer
      const t = projects[currentProjectIndex].tasks[currentTaskIndex];
      t.complete = true;
      sessionStatus = "Completed";
      stopTimer();
      renderMeta();
      renderTasks();
    });

    btnNext.addEventListener("click", ()=>{
      // keep task incomplete, move along
      sessionStatus = "Incomplete";
      stopTimer();
      moveToNextTask();
      renderTasks();
    });

    btnCloseModal.addEventListener("click", closeModal);
    btnModalCancel.addEventListener("click", closeModal);

    projectSelect.addEventListener("change", refreshTaskSelect);

    btnModalStart.addEventListener("click", ()=>{
      const pi = parseInt(projectSelect.value,10);
      const ti = parseInt(taskSelect.value,10);
      const dur = parseInt(durationSelect.value,10);

      currentProjectIndex = pi;
      currentTaskIndex = ti;

      renderHeader();
      resetSession(dur);
      startTimer();
      renderTasks();
      closeModal();
    });

    modalBackdrop.addEventListener("click", (e)=>{
      if(e.target === modalBackdrop) closeModal();
    });

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape") closeModal();
    });

    // -----------------------------
    // Init
    // -----------------------------
    (function init(){
      renderHeader();
      resetSession(durationSec);
      renderTasks();
      // start paused by default; click Assign/Choose to start
    })();
  </script>
</body>
</html>
