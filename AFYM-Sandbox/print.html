<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Print Recipe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: auto;
      color: #000;
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      margin-bottom: 20px;
      font-size: 14px;
    }

    h2 {
      margin-top: 30px;
    }

    ul, ol {
      margin-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    .section {
      margin-bottom: 20px;
    }

    @media print {
      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>

<div id="printContent">Loading...</div>

<script>
  function getRecipeIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  async function loadPrintRecipe() {
    const recipeId = getRecipeIdFromUrl();
    if (!recipeId) return;

    try {
      const res = await fetch(`recipes/${recipeId}.json`);
      const recipe = await res.json();

      document.title = recipe.title;

      const ingredients = (recipe.ingredients || [])
        .map(i => `<li>${i}</li>`).join('');

      const steps = (recipe.instructions || [])
        .map(s => `<li>${s}</li>`).join('');

      const notes = (recipe.notes || [])
        .map(n => `<li>${n}</li>`).join('');

      document.getElementById('printContent').innerHTML = `
        <h1>${recipe.title}</h1>

        <div class="meta">
          Prep: ${recipe.prepTime} | 
          Cook: ${recipe.cookTime} | 
          Total: ${recipe.totalTime} | 
          Serves: ${recipe.servings}
        </div>

        <div class="section">
          <h2>Ingredients</h2>
          <ul>${ingredients}</ul>
        </div>

        <div class="section">
          <h2>Instructions</h2>
          <ol>${steps}</ol>
        </div>

        <div class="section">
          <h2>Notes</h2>
          <ul>${notes}</ul>
        </div>
      `;

      // Auto open print dialog
      setTimeout(() => window.print(), 300);

    } catch (err) {
      document.getElementById('printContent').innerHTML = 'Failed to load recipe.';
    }
  }

  loadPrintRecipe();
</script>

</body>
</html>
