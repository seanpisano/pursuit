<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Print Recipe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 800px;
      margin: auto;
      color: #000;
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      margin-bottom: 20px;
      font-size: 14px;
    }

    h2 {
      margin-top: 30px;
    }

    ul, ol {
      margin-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    .section {
      margin-bottom: 20px;
    }
    .print-footer {
      margin-top: 50px;
      padding-top: 20px;
      border-top: 2px solid #000;
      text-align: center;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .footer-tagline {
      font-size: 13px;
      font-style: italic;
      margin-bottom: 6px;
    }

    .footer-url {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .footer-copy {
      font-size: 11px;
      color: #555;
    }

    @media print {
      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>

<div id="printContent">Loading...</div>

<script>
  function getRecipeIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  async function loadPrintRecipe() {
    const recipeId = getRecipeIdFromUrl();
    if (!recipeId) return;

    try {
      const res = await fetch(`recipes/${recipeId}.json`);
      const recipe = await res.json();

      document.title = recipe.title;

      const ingredients = (recipe.ingredients || [])
        .map(i => `<li>${i}</li>`).join('');

      const steps = (recipe.instructions || [])
        .map(s => `<li>${s}</li>`).join('');

      const notes = (recipe.notes || [])
        .map(n => `<li>${n}</li>`).join('');

      document.getElementById('printContent').innerHTML = `
        <h1>${recipe.title}</h1>

        <div class="meta">
          Prep: ${recipe.prepTime} | 
          Cook: ${recipe.cookTime} | 
          Total: ${recipe.totalTime} | 
          Serves: ${recipe.servings}
        </div>

        <div class="section">
          <h2>Ingredients</h2>
          <ul>${ingredients}</ul>
        </div>

        <div class="section">
          <h2>Instructions</h2>
          <ol>${steps}</ol>
        </div>

        <div class="section">
          <h2>Notes</h2>
          <ul>${notes}</ul>
        </div>

        <div class="print-footer">
          <div class="footer-brand">Art For Your Mouth</div>
          <div class="footer-tagline">Because boring food is a waste of time.</div>
          <div class="footer-url">https://www.artforyourmouth.com/</div>
          <div class="footer-copy">© ${new Date().getFullYear()}</div>
        </div>
      `;

      // Auto open print dialog
      setTimeout(() => window.print(), 300);

    } catch (err) {
      document.getElementById('printContent').innerHTML = 'Failed to load recipe.';
    }
  }

  loadPrintRecipe();
</script>

</body>
</html>
