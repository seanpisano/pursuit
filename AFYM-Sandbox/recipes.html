<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art For Your Mouth | Recipes</title>
  <style>
    :root {
      --bg: #000000;
      --green: #2f7d1f;
      --green-light: #5baa3c;
      --orange: #f45a18;
      --orange-light: #ff8a2a;
      --cream: #f4e4c6;
      --text: #f7f7f7;
      --muted: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --panel: rgba(255,255,255,0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,125,31,0.14), transparent 30%),
        radial-gradient(circle at bottom, rgba(244,90,24,0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 32px 20px 60px;
    }

    .page-wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .site-header img {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.45));
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(91,170,60,0.35);
      background: rgba(47,125,31,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: 0.25s ease;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .top-nav a.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .home-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .sort-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
    }

    .sort-label {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sort-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sort-buttons button {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(91,170,60,0.35);
      background: rgba(47,125,31,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: 0.25s ease;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
    }

    .sort-buttons button:hover,
    .sort-buttons button:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
      outline: none;
    }

    .sort-buttons button.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .main-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      min-height: 320px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
      margin-top: 12px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 24px rgba(0,0,0,0.24);
      cursor: pointer;
      transition: 0.3s ease;
    }

    .card:hover,
    .card:focus {
      transform: translateY(-3px);
      border-color: var(--orange);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 14px 12px 16px;
      display: grid;
      gap: 12px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--cream);
      line-height: 1.2;
    }

    .card-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .card-meta span {
      background: rgba(255,255,255,0.08);
      padding: 6px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      text-align: center;
    }

    @media (max-width: 560px) {
      body { padding: 20px 14px 40px; }
      .main-shell { padding: 16px; }
      .sort-section { flex-direction: column; align-items: flex-start; }
      .card img { height: 150px; }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <header class="site-header">
      <a href="index.html">
        <img src="assets/imgs/logo.png" alt="Art For Your Mouth logo" />
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html" title="Home" class="home-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9,22 9,12 15,12 15,22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="about.html">About</a>
        <a href="prep.html">Prep</a>
        <a href="spices.html">Spices</a>
        <a href="meats.html">Meats</a>
        <a href="vegtables.html">Vegtables</a>
        <a href="recipes.html" class="active">Recipes</a>
      </nav>

      <div class="sort-section">
        <div class="sort-label">Sort By</div>
        <div class="sort-buttons">
          <button id="sortDefault" class="sort-btn active" data-sort="">Default</button>
          <button id="sortTitle" class="sort-btn" data-sort="title">Title</button>
          <button id="sortPrepTime" class="sort-btn" data-sort="prepTime">Prep Time</button>
        </div>
      </div>
    </header>

    <section class="main-shell">
      <div id="cards" class="cards-grid"></div>
    </section>
  </main>
  <script src="assets/js/recipes.js"></script>
  <script>
    const recipeList = RECIPES;

    const cards = document.getElementById('cards');
    const sortButtons = document.querySelectorAll('.sort-btn');

    let recipes = [];
    let currentSort = '';

    async function loadRecipes() {
      try {
        const loads = recipeList.map(id => fetch(`recipes/${id}.json`).then(r => r.json()));
        recipes = await Promise.all(loads);
        renderCards(recipes);
      } catch (error) {
        cards.innerHTML = `<div class="empty-state">Unable to load recipes; check your recipes JSON path.</div>`;
        console.error(error);
      }
    }

    function renderCards(items) {
      cards.innerHTML = items.map(recipe => `
        <article class="card" tabindex="0" role="button" aria-label="Open ${recipe.title}" data-id="${recipe.id}">
          <img src="${recipe.image}" alt="${recipe.title}" />
          <div class="card-body">
            <div class="card-title">${recipe.title}</div>
            <div class="card-meta">
              <span>Prep: ${recipe.prepTime}</span>
              <span>Cook: ${recipe.cookTime}</span>
              <span>Total: ${recipe.totalTime}</span>
              <span>Serves: ${recipe.servings}</span>
            </div>
          </div>
        </article>
      `).join('');

      cards.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          window.location.href = `recipe.html?id=${encodeURIComponent(id)}`;
        });
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      });
    }

    function sortRecipes(sortValue) {
      currentSort = sortValue;
      let sorted = [...recipes];

      if (sortValue === 'title') {
        sorted.sort((a, b) => a.title.localeCompare(b.title));
      } else if (sortValue === 'prepTime') {
        sorted.sort((a, b) => parseInt(a.prepTime) - parseInt(b.prepTime));
      }

      renderCards(sorted);
    }

    sortButtons.forEach(button => {
      button.addEventListener('click', () => {
        sortButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        sortRecipes(button.dataset.sort);
      });
    });

    loadRecipes();
  </script>
</body>
</html>
