<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art For Your Mouth | Recipe</title>
  <style>
    :root {
      --bg: #000000;
      --green: #2f7d1f;
      --green-light: #5baa3c;
      --orange: #f45a18;
      --orange-light: #ff8a2a;
      --cream: #f4e4c6;
      --text: #f7f7f7;
      --muted: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --panel: rgba(255,255,255,0.04);
      --panel-strong: rgba(255,255,255,0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,125,31,0.14), transparent 30%),
        radial-gradient(circle at bottom, rgba(244,90,24,0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 32px 20px 60px;
    }

    .page-wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .site-header img {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.45));
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(91,170,60,0.35);
      background: rgba(47,125,31,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: 0.25s ease;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .recipe-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .hero-image {
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      min-height: 380px;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
    }

    .eyebrow {
      color: var(--orange-light);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }

    .description {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 12px;
    }

    .meta-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    .meta-card span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .meta-card strong {
      font-size: 1rem;
      color: var(--cream);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(244,90,24,0.12);
      border: 1px solid rgba(244,90,24,0.35);
      color: var(--text);
      font-size: 0.9rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
    }

    .panel h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: var(--cream);
    }

    .ingredients-list,
    .notes-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .ingredients-list li,
    .notes-list li {
      padding-left: 18px;
      position: relative;
      color: var(--text);
      line-height: 1.5;
    }

    .ingredients-list li::before,
    .notes-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-light);
      position: absolute;
      left: 0;
      top: 9px;
    }

    .steps-list {
      display: grid;
      gap: 16px;
      counter-reset: recipe-step;
      list-style: none;
    }

    .steps-list li {
      counter-increment: recipe-step;
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: start;
    }

    .step-num {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #fff;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(244,90,24,0.28);
    }

    .step-copy {
      padding-top: 8px;
      color: var(--text);
      line-height: 1.65;
    }

    .story-block {
      margin-top: 24px;
    }

    .story-block p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .hero-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .hero-image {
        min-height: 280px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 20px 14px 40px;
      }

      .recipe-shell {
        padding: 16px;
      }

      .panel {
        padding: 18px;
      }

      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <header class="site-header">
      <img src="assets/imgs/logo.png" alt="Art For Your Mouth logo" />
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="#">Recipes</a>
        <a href="#">Flavor</a>
        <a href="#">Stories</a>
        <a href="#">Pairings</a>
        <a href="#">About</a>
      </nav>
    </header>

    <section class="recipe-shell" id="recipePage">
      <p>Loading recipe...</p>
    </section>
  </main>

  <script>
    async function loadRecipe() {
      try {
        const response = await fetch('recipes/spicy-honey-noodles.json');
        const recipe = await response.json();

        document.title = `Art For Your Mouth | ${recipe.title}`;

        const tagsHTML = recipe.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        const ingredientsHTML = recipe.ingredients.map(item => `<li>${item}</li>`).join('');
        const stepsHTML = recipe.instructions.map(step => `
          <li>
            <div class="step-num"></div>
            <div class="step-copy">${step}</div>
          </li>
        `).join('');
        const notesHTML = recipe.notes.map(note => `<li>${note}</li>`).join('');

        document.getElementById('recipePage').innerHTML = `
          <section class="hero-grid">
            <div class="hero-image">
              <img src="${recipe.image}" alt="${recipe.title}">
            </div>

            <div class="hero-copy">
              <p class="eyebrow">${recipe.category}</p>
              <h1>${recipe.title}</h1>
              <p class="description">${recipe.description}</p>

              <div class="meta-grid">
                <div class="meta-card">
                  <span>Prep Time</span>
                  <strong>${recipe.prepTime}</strong>
                </div>
                <div class="meta-card">
                  <span>Cook Time</span>
                  <strong>${recipe.cookTime}</strong>
                </div>
                <div class="meta-card">
                  <span>Total Time</span>
                  <strong>${recipe.totalTime}</strong>
                </div>
                <div class="meta-card">
                  <span>Serves</span>
                  <strong>${recipe.servings}</strong>
                </div>
                <div class="meta-card">
                  <span>Difficulty</span>
                  <strong>${recipe.difficulty}</strong>
                </div>
                <div class="meta-card">
                  <span>Flavor</span>
                  <strong>${recipe.flavorProfile}</strong>
                </div>
              </div>

              <div class="tag-row">
                ${tagsHTML}
              </div>
            </div>
          </section>

          <section class="content-grid">
            <aside class="panel">
              <h2>Ingredients</h2>
              <ul class="ingredients-list">
                ${ingredientsHTML}
              </ul>

              <div class="story-block">
                <h2>Why This Hits</h2>
                <p>${recipe.whyThisHits}</p>
              </div>

              <div class="story-block">
                <h2>Notes</h2>
                <ul class="notes-list">
                  ${notesHTML}
                </ul>
              </div>
            </aside>

            <section class="panel">
              <h2>Instructions</h2>
              <ol class="steps-list">
                ${stepsHTML}
              </ol>

              <div class="story-block">
                <h2>Pair It With</h2>
                <p>${recipe.pairing}</p>
              </div>
            </section>
          </section>

          <p class="footer-note">${recipe.footerLine}</p>
        `;

        injectRecipeSchema(recipe);
      } catch (error) {
        document.getElementById('recipePage').innerHTML = `
          <div class="panel">
            <h2>Recipe could not load</h2>
            <p>Please make sure your JSON file path is correct.</p>
          </div>
        `;
        console.error(error);
      }
    }

    function injectRecipeSchema(recipe) {
      const schema = {
        "@context": "https://schema.org",
        "@type": "Recipe",
        "name": recipe.title,
        "description": recipe.description,
        "image": recipe.image,
        "recipeCategory": recipe.category,
        "recipeCuisine": recipe.cuisine,
        "keywords": recipe.tags.join(", "),
        "prepTime": recipe.prepTimeISO,
        "cookTime": recipe.cookTimeISO,
        "totalTime": recipe.totalTimeISO,
        "recipeYield": `${recipe.servings} servings`,
        "recipeIngredient": recipe.ingredients,
        "recipeInstructions": recipe.instructions.map(step => ({
          "@type": "HowToStep",
          "text": step
        }))
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.textContent = JSON.stringify(schema);
      document.head.appendChild(script);
    }

    loadRecipe();
  </script>
</body>
</html>
