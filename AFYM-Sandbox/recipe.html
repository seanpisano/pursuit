<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art For Your Mouth | Recipe</title>
  <style>
    :root {
      --bg: #000000;
      --green: #2f7d1f;
      --green-light: #5baa3c;
      --orange: #f45a18;
      --orange-light: #ff8a2a;
      --cream: #f4e4c6;
      --text: #f7f7f7;
      --muted: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --panel: rgba(255,255,255,0.04);
      --panel-strong: rgba(255,255,255,0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,125,31,0.14), transparent 30%),
        radial-gradient(circle at bottom, rgba(244,90,24,0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 32px 20px 60px;
    }

    .page-wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .site-header img {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.45));
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(91,170,60,0.35);
      background: rgba(47,125,31,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: 0.25s ease;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .home-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .home-icon svg {
      width: 20px;
      height: 20px;
    }

    .recipe-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .hero-image {
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      min-height: 380px;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 18px;
      justify-content: center;
    }

    .eyebrow {
      color: var(--orange-light);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
    }

    .description {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 12px;
    }

    .meta-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    .meta-card span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .meta-card strong {
      font-size: 1rem;
      color: var(--cream);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(244,90,24,0.12);
      border: 1px solid rgba(244,90,24,0.35);
      color: var(--text);
      font-size: 0.9rem;
    }

    .recipe-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }

    .print-btn {
      border: 1px solid rgba(244,90,24,0.45);
      background: rgba(244,90,24,0.14);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .print-btn:hover,
    .print-btn:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
      outline: none;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
    }

    .panel h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: var(--cream);
    }

    .ingredients-list,
    .notes-list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .ingredients-list li,
    .notes-list li {
      padding-left: 18px;
      position: relative;
      color: var(--text);
      line-height: 1.5;
    }

    .ingredients-list li::before,
    .notes-list li::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-light);
      position: absolute;
      left: 0;
      top: 9px;
    }

    .steps-list {
      display: grid;
      gap: 16px;
      counter-reset: recipe-step;
      list-style: none;
    }

    .steps-list li {
      counter-increment: recipe-step;
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: start;
    }

    .step-num {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #fff;
      font-weight: bold;
      box-shadow: 0 10px 24px rgba(244,90,24,0.28);
    }

    .step-copy {
      padding-top: 8px;
      color: var(--text);
      line-height: 1.65;
    }

    .story-block {
      margin-top: 24px;
    }

    .story-block p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
    }

    .search-field {
      position: relative;
    }

    .search-field input {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 20px;
      font-size: 1rem;
      outline: none;
      transition: 0.25s ease;
    }

    .search-field input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .search-field input:focus,
    .search-select select:focus {
      border-color: rgba(244,90,24,0.8);
      box-shadow: 0 0 0 4px rgba(244,90,24,0.14);
    }

    .search-select select {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 16 16"><path d="M8 12l-6-6h12z"/></svg>') no-repeat right 16px center;
      background-size: 16px;
      color: var(--text);
      padding: 0 40px 0 16px;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
      transition: 0.25s ease;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    .search-select option {
      color: #000;
    }

    @media (max-width: 900px) {
      .hero-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .hero-image {
        min-height: 280px;
      }
    }

    @media (max-width: 700px) {
      .search-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 20px 14px 40px;
      }

      .recipe-shell {
        padding: 16px;
      }

      .panel {
        padding: 18px;
      }

      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .search-field input,
      .search-select select {
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <header class="site-header">
      <a href="index.html">
        <img src="assets/imgs/logo.png" alt="Art For Your Mouth logo" />
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html" title="Home" class="home-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9,22 9,12 15,12 15,22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="about.html">About</a>
        <a href="prep.html">Prep</a>
        <a href="spices.html">Spices</a>
        <a href="meats.html">Meats</a>
        <a href="vegtables.html">Vegtables</a>
        <a href="recipes.html" class="active">Recipes</a>
      </nav>

      <div class="search-row">
        <div class="search-field">
          <input type="text" placeholder="Search for recipes, flavors, ingredients, or inspiration" />
        </div>

        <div class="search-select">
          <select aria-label="Search style">
            <option>Search</option>
            <option>Food Style 1</option>
            <option>Food Style 2</option>
            <option>Food Style 3</option>
            <option>Food Style 4</option>
            <option>Food Style 5</option>
          </select>
        </div>
      </div>
    </header>

    <section class="recipe-shell" id="recipePage">
      <p>Loading recipe...</p>
    </section>
  </main>
  <script src="assets/js/recipes.js"></script>
  <script>
    function getRecipeIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function getRecipePath(recipeId) {
      const validIds = RECIPES;

      if (!recipeId || !validIds.includes(recipeId)) {
        return null;
      }

      return `recipes/${recipeId}.json`;
    }

    function openPrintView() {
      const recipeId = getRecipeIdFromUrl();
      if (!recipeId) return;
      window.open(`print.html?id=${encodeURIComponent(recipeId)}`, '_blank');
    }

    function injectRecipeSchema(recipe) {
      const oldSchema = document.getElementById("recipe-schema");
      if (oldSchema) oldSchema.remove();

      const schema = {
        "@context": "https://schema.org",
        "@type": "Recipe",
        "name": recipe.title,
        "description": recipe.description,
        "image": recipe.image,
        "recipeCategory": recipe.category,
        "recipeCuisine": recipe.cuisine,
        "keywords": recipe.tags ? recipe.tags.join(", ") : "",
        "prepTime": recipe.prepTimeISO,
        "cookTime": recipe.cookTimeISO,
        "totalTime": recipe.totalTimeISO,
        "recipeYield": recipe.servings,
        "recipeIngredient": recipe.ingredients || [],
        "recipeInstructions": (recipe.instructions || []).map(step => ({
          "@type": "HowToStep",
          "text": step
        }))
      };

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "recipe-schema";
      script.textContent = JSON.stringify(schema);
      document.head.appendChild(script);
    }

    async function loadRecipe() {
      const recipeId = getRecipeIdFromUrl();
      const recipePath = getRecipePath(recipeId);

      if (!recipePath) {
        document.getElementById('recipePage').innerHTML = `
          <div class="panel">
            <h2>No recipe selected</h2>
            <p>Select a recipe from <a href="recipes.html">Recipes</a>.</p>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(recipePath);
        if (!response.ok) {
          throw new Error(`Could not load ${recipePath}`);
        }

        const recipe = await response.json();

        document.title = `Art For Your Mouth | ${recipe.title}`;

        const tagsHTML = (recipe.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
        const ingredientsHTML = (recipe.ingredients || []).map(item => `<li>${item}</li>`).join('');
        const stepsHTML = (recipe.instructions || []).map((step, index) => `
          <li>
            <div class="step-num">${index + 1}</div>
            <div class="step-copy">${step}</div>
          </li>
        `).join('');
        const notesHTML = (recipe.notes || []).map(note => `<li>${note}</li>`).join('');

        document.getElementById('recipePage').innerHTML = `
          <section class="hero-grid">
            <div class="hero-image">
              <img src="${recipe.image}" alt="${recipe.title}">
            </div>

            <div class="hero-copy">
              <p class="eyebrow">${recipe.category || ''}</p>
              <h1>${recipe.title || ''}</h1>
              <p class="description">${recipe.description || ''}</p>

              <div class="recipe-actions">
                <button type="button" class="print-btn" onclick="openPrintView()">Print Recipe</button>
              </div>

              <div class="meta-grid">
                <div class="meta-card">
                  <span>Prep Time</span>
                  <strong>${recipe.prepTime || ''}</strong>
                </div>
                <div class="meta-card">
                  <span>Cook Time</span>
                  <strong>${recipe.cookTime || ''}</strong>
                </div>
                <div class="meta-card">
                  <span>Total Time</span>
                  <strong>${recipe.totalTime || ''}</strong>
                </div>
                <div class="meta-card">
                  <span>Serves</span>
                  <strong>${recipe.servings || ''}</strong>
                </div>
                <div class="meta-card">
                  <span>Difficulty</span>
                  <strong>${recipe.difficulty || ''}</strong>
                </div>
                <div class="meta-card">
                  <span>Flavor</span>
                  <strong>${recipe.flavorProfile || ''}</strong>
                </div>
              </div>

              <div class="tag-row">
                ${tagsHTML}
              </div>
            </div>
          </section>

          <section class="content-grid">
            <aside class="panel">
              <h2>Ingredients</h2>
              <ul class="ingredients-list">
                ${ingredientsHTML}
              </ul>

              <div class="story-block">
                <h2>Why This Hits</h2>
                <p>${recipe.whyThisHits || ''}</p>
              </div>

              <div class="story-block">
                <h2>Notes</h2>
                <ul class="notes-list">
                  ${notesHTML}
                </ul>
              </div>
            </aside>

            <section class="panel">
              <h2>Instructions</h2>
              <ol class="steps-list">
                ${stepsHTML}
              </ol>

              <div class="story-block">
                <h2>Pair It With</h2>
                <p>${recipe.pairing || ''}</p>
              </div>
            </section>
          </section>

          <p class="footer-note">${recipe.footerLine || ''}</p>
        `;

        injectRecipeSchema(recipe);
      } catch (error) {
        document.getElementById('recipePage').innerHTML = `
          <div class="panel">
            <h2>Recipe could not load</h2>
            <p>Please make sure your JSON file path is correct.</p>
          </div>
        `;
        console.error(error);
      }
    }

    document.addEventListener('DOMContentLoaded', loadRecipe);
  </script>
</body>
</html>
