<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art For Your Mouth | Prep</title>
  <style>
    :root {
      --bg: #000000;
      --green: #2f7d1f;
      --green-light: #5baa3c;
      --orange: #f45a18;
      --orange-light: #ff8a2a;
      --cream: #f4e4c6;
      --text: #f7f7f7;
      --muted: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.14);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(47,125,31,0.14), transparent 30%),
        radial-gradient(circle at bottom, rgba(244,90,24,0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      padding: 32px 20px 60px;
    }

    .page-wrap {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .site-header img {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.45));
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-nav a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(91,170,60,0.35);
      background: rgba(47,125,31,0.12);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: 0.25s ease;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      transform: translateY(-2px);
    }

    .top-nav a.active {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
    }

    .search-field input {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 20px;
      font-size: 1rem;
      outline: none;
      transition: 0.25s ease;
    }

    .search-field input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .search-field input:focus,
    .search-select select:focus {
      border-color: rgba(244,90,24,0.8);
      box-shadow: 0 0 0 4px rgba(244,90,24,0.14);
    }

    .search-select select {
      width: 100%;
      height: 60px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 0 16px;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
      transition: 0.25s ease;
      appearance: none;
    }

    .search-select option {
      color: #000;
    }

    .main-shell {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      min-height: 300px;
    }

    @media (max-width: 700px) {
      .search-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 20px 14px 40px;
      }

      .main-shell {
        padding: 16px;
      }

      .search-field input,
      .search-select select {
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <header class="site-header">
      <a href="index.html">
        <img src="assets/imgs/logo.png" alt="Art For Your Mouth logo" />
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="about.html">About</a>
        <a href="prep.html" class="active">Prep</a>
        <a href="spices.html">Spices</a>
        <a href="meats.html">Meats</a>
        <a href="vegtables.html">Vegtables</a>
        <a href="recipe.html">Recipes</a>
      </nav>

      <div class="search-row">
        <div class="search-field">
          <input type="text" placeholder="Search for recipes, flavors, ingredients, or inspiration" />
        </div>

        <div class="search-select">
          <select aria-label="Search style">
            <option>Search</option>
            <option>Food Style 1</option>
            <option>Food Style 2</option>
            <option>Food Style 3</option>
            <option>Food Style 4</option>
            <option>Food Style 5</option>
          </select>
        </div>
      </div>
    </header>

    <section class="main-shell">
      <!-- Content goes here -->
    </section>
  </main>
</body>
</html>
