<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KM / Miles Converter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="card">
      <h1>Unit Converter</h1>
      <p class="subtitle">Convert between kilometers and miles</p>

      <form id="converter-form">
        <label for="distance">Enter a number</label>
        <input
          type="number"
          id="distance"
          name="distance"
          step="any"
          placeholder="Example: 5"
          required
        />

        <label for="direction">Conversion direction</label>
        <select id="direction" name="direction">
          <option value="km-to-mi">Kilometers to Miles</option>
          <option value="mi-to-km">Miles to Kilometers</option>
        </select>

        <button type="submit">Convert</button>
      </form>

      <section class="result-box" aria-live="polite">
        <h2>Result</h2>
        <p id="result">Your converted value will appear here.</p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
